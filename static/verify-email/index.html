<!doctype html>
<html lang="en">
  <head>
    <title>Verify Email — Nyman Apps</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        max-width: 28rem; margin: 3rem auto; padding: 0 1rem; line-height: 1.5;
      }
      h1 { font-size: 1.5rem; }
      .msg { margin-top: 1rem; padding: 0.75rem; border-radius: 0.375rem; }
      .msg.err { background: #fde8e8; color: #9b1c1c; }
      .msg.ok { background: #e6f4ea; color: #137333; }
      @media (prefers-color-scheme: dark) {
        .msg.err { background: #3b1414; color: #f7b2b2; }
        .msg.ok { background: #10301a; color: #a6e3bb; }
      }
    </style>
  </head>
  <body>
    <h1>Email Verification</h1>
    <main><p>Verifying…</p></main>

    <script>
      (async () => {
        const main = document.querySelector("main");
        const url = new URL(location.href);
        const code = url.searchParams.get("code");
        // `type` lets the same page confirm an email change as well as a signup.
        const type = url.searchParams.get("type") === "change_email"
          ? "change_email"
          : "verify_email";
        if (!code) {
          main.innerHTML =
            `<p class="msg err">No verification code found. Please use the link from your email.</p>`;
          return;
        }
        try {
          const res = await fetch(
            `/api/auth/v1/${type}/confirm/${encodeURIComponent(code)}`,
          );
          if (res.ok) {
            main.innerHTML =
              `<p class="msg ok">Your email is verified. You can now log in at ` +
              `<a href="https://soccer.jnyman.com/login">soccer</a> or ` +
              `<a href="https://weight.jnyman.com/login">weight</a>.</p>`;
          } else if (res.status >= 500) {
            main.innerHTML =
              `<p class="msg err">The server is temporarily unavailable. ` +
              `Please try again in a moment.</p>`;
          } else {
            main.innerHTML =
              `<p class="msg err">Verification failed — the link may have expired. ` +
              `Request a new verification email.</p>`;
          }
        } catch (err) {
          main.innerHTML = `<p class="msg err">Network error: ${err.message}</p>`;
        }
      })();
    </script>
  </body>
</html>
